<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pengaturan - ERGO AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-600 text-white p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold">ERGO AI - Pengaturan</h1>
        <a href="/dashboard" class="bg-gray-500 px-4 py-2 rounded hover:bg-gray-600">Kembali</a>
    </nav>
    <div class="p-8 max-w-2xl mx-auto">
        <h2 class="text-3xl font-bold text-gray-800 mb-6">Pengaturan Aplikasi</h2>
        <div class="bg-white p-6 rounded-lg shadow space-y-6">
            <div class="flex justify-between items-center border-b pb-4">
                <div>
                    <h3 class="font-bold text-gray-800">Notifikasi Suara</h3>
                    <p class="text-sm text-gray-500">Bunyikan alarm saat postur bungkuk</p>
                </div>
                <input type="checkbox" checked class="w-6 h-6 text-blue-600">
            </div>
            <div class="flex justify-between items-center border-b pb-4">
                <div>
                    <h3 class="font-bold text-gray-800">Monitoring Otomatis</h3>
                    <p class="text-sm text-gray-500">Mulai webcam otomatis saat login</p>
                </div>
                <input type="checkbox" class="w-6 h-6 text-blue-600">
            </div>
            <button class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">Simpan Pengaturan</button>
        </div>
    </div>
</body>
</html>
