<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - ERGOVISION</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-lg w-96">
        <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">ERGOVISION Login</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="bg-red-100 text-red-700 p-2 rounded mb-4 text-sm">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="email" name="email" placeholder="Email" class="w-full p-3 border rounded mb-4" required>
            <input type="password" name="password" placeholder="Password" class="w-full p-3 border rounded mb-6" required>
            <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">Login</button>
        </form>
        <p class="text-center text-sm mt-4">Belum punya akun? <a href="/register" class="text-blue-600 font-bold">Daftar</a></p>
    </div>
</body>
</html>
