<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monitoring Live - ErgoVision</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 20px; }
        #video-container { position: relative; width: 640px; margin: 0 auto; }
        video { width: 100%; border-radius: 10px; border: 2px solid #0f3460; }
        #overlay { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; text-align: left; }
        .status-box { margin-top: 20px; padding: 15px; background: #16213e; border-radius: 10px; display: inline-block; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #e94560; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Monitoring Postur Real-Time</h1>
    
    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
        <div id="overlay">
            <div style="color: yellow;">Sudut: <span id="angle-display">-</span></div>
            <div style="color: #0f0;">Skor: <span id="score-display">-</span></div>
            <div style="color: white;">Status: <span id="status-display">Menunggu...</span></div>
        </div>
    </div>

    <div class="status-box">
        <p>AI Status: <span id="ai-status" style="color: yellow;">Processing...</span></p>
    </div>
    <br>
    <button onclick="stopMonitoring()">Stop Monitoring & Kembali</button>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let stream;

        // 1. Akses Webcam Browser
        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
            .then(s => {
                stream = s;
                video.srcObject = stream;
                video.play();
                startAnalysis();
            })
            .catch(err => {
                alert("Gagal akses webcam: " + err);
            });

        // 2. Kirim gambar ke server tiap 1 detik
        function startAnalysis() {
            setInterval(() => {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    const imageData = canvas.toDataURL('image/jpeg', 0.5); // Kompres gambar
                    
                    fetch('/api/analyze_posture', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: imageData })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            document.getElementById('angle-display').innerText = data.sudut + " deg";
                            document.getElementById('score-display').innerText = data.skor;
                            document.getElementById('status-display').innerText = data.kategori;
                            document.getElementById('ai-status').innerText = "AI Aktif (Server)";
                            document.getElementById('ai-status').style.color = "#0f0";
                        } else {
                            document.getElementById('status-display').innerText = "Tidak terdeteksi";
                        }
                    })
                    .catch(err => console.error("Error:", err));
                }
            }, 1000); // Kirim tiap 1000ms (1 detik) biar server nggak berat
        }

        function stopMonitoring() {
            if (stream) stream.getTracks().forEach(track => track.stop());
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
